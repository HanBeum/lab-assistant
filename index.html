<video id="webcam" autoplay playsinline width="320" height="240"></video>
<button onclick="identifyEquipment()">실험기구 확인하기</button>
<div id="result">여기에 설명이 나옵니다...</div>

<script>
// 1. 카메라 켜기
const video = document.getElementById('webcam');
navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
  video.srcObject = stream;
});

// 2. 사진 찍고 AI에게 물어보기
async function identifyEquipment() {
  const canvas = document.createElement('canvas');
  canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
  const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

  const API_KEY = 'YOUR_GEMINI_API_KEY'; // 여기에 발급받은 키 입력
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

  const response = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: "너는 화학 교사야. 이 사진 속 실험기구 이름과 고등학생 수준에서의 구체적인 사용법, 주의사항을 알려줘." },
          { inline_data: { mime_type: "image/jpeg", data: base64Image } }
        ]
      }]
    })
  });

  const data = await response.json();
  document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
}
</script>
