<script>
    // 1. 실제 발급받은 API 키를 꼭 확인해서 넣어주세요!
    const API_KEY = 'AIzaSyBGzVS5LJLk_ednYu2y0i4EckmgGOUS5R8'; 

    const video = document.getElementById('webcam');
    const resultDiv = document.getElementById('result');
    const identifyBtn = document.getElementById('identifyBtn');

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">카메라 오류: ${err.message}</span>`;
        }
    }
    startCamera();

    async function identifyEquipment() {
        identifyBtn.disabled = true;
        identifyBtn.innerText = "분석 중...";
        resultDiv.innerHTML = "<span>AI가 사진을 분석하고 있습니다...</span>";

        try {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            // 2. 이 주소가 2026년 기준 가장 표준적인 API 호출 주소입니다.
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "너는 베테랑 화학 교사야. 사진 속 실험기구의 이름, 고교 수준의 사용법, 그리고 취급 시 주의사항을 초보 학생도 이해하기 쉽게 설명해줘." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                // 에러 발생 시 상세 메시지 출력
                const errorMsg = data.error ? data.error.message : "응답 형식이 잘못되었습니다.";
                throw new Error(errorMsg);
            }

        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">오류 발생: ${err.message}</span>`;
        } finally {
            identifyBtn.disabled = false;
            identifyBtn.innerText = "실험기구 확인하기";
        }
    }
</script>
