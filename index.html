<script>
    // 1. 보안을 위해 코드에서 키를 지웁니다. 
    // 브라우저 저장소(localStorage)에서 키를 가져오거나 없으면 물어봅니다.
    let API_KEY = localStorage.getItem('gemini_api_key');

    if (!API_KEY) {
        API_KEY = prompt("AIzaSyDhSfxbTKCGv_wIYAT2qtDm3GJen8H_Tcc");
        if (API_KEY) {
            localStorage.setItem('gemini_api_key', API_KEY);
        }
    }

    const video = document.getElementById('webcam');
    const resultDiv = document.getElementById('result');
    const identifyBtn = document.getElementById('identifyBtn');

    // 카메라 시작
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">카메라 오류: ${err.message}</span>`;
        }
    }
    startCamera();

    // 분석 함수
    async function identifyEquipment() {
        if (!API_KEY) {
            alert("API Key가 없습니다. 페이지를 새로고침하여 입력해주세요.");
            return;
        }

        identifyBtn.disabled = true;
        identifyBtn.innerText = "분석 중...";
        resultDiv.innerHTML = "<span>AI가 사진을 분석하고 있습니다...</span>";

        try {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            // 최신 표준 주소 (v1beta 사용)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "너는 화학 교사야. 사진 속 실험기구의 이름과 고등학생 수준의 사용법을 친절하게 설명해줘." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                // 키가 또 막혔거나 오류가 나면 저장된 키를 지우고 에러 표시
                if(data.error.code === 403) localStorage.removeItem('gemini_api_key');
                throw new Error(data.error.message);
            }

            resultDiv.innerText = data.candidates[0].content.parts[0].text;

        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">오류 발생: ${err.message}</span>`;
        } finally {
            identifyBtn.disabled = false;
            identifyBtn.innerText = "실험기구 확인하기";
        }
    }

    // 키 초기화 버튼 (필요시 사용)
    function resetKey() {
        localStorage.removeItem('gemini_api_key');
        location.reload();
    }
</script>
